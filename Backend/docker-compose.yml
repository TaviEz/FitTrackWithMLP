services:
  user-service:
    build: 
      context: .
      dockerfile: FitTrackWithMLP/UserManagementService/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal,1433;User Id=sa;Password=sa;Database=AuthServiceDb;TrustServerCertificate=True;
      - ConnectionStrings__RedisConnection=redis:6379,abortConnect=false
      - Jwt__Key=${JWT_SECRET}
    depends_on:
      - redis
  daily-plan-service:
    build:
      context: .
      dockerfile: FitTrackWithMLP/DailyPlanService/Dockerfile
    ports:
      - "8082:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal,1433;User Id=sa;Password=sa;Database=DailyPlanServiceDb;TrustServerCertificate=True;
      - ConnectionStrings__RedisConnection=redis:6379,abortConnect=false
      - Jwt__Key=${JWT_SECRET}
      - Optimizer__Url=http://optimizer-service:8080
    depends_on:
      - redis
      - optimizer-service
  optimizer-service:
    build:
      context: .
      dockerfile: MealOptimizerService/Dockerfile
    ports:
      - "8083:8080"
  redis:
    image: redis:alpine
    container_name: fittrack-redis
    ports:
      - "6379:6379"